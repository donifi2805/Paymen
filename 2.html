<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alat Modifikasi HTML v3.4 (Multi-JSON)</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/theme/tokyo-night.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/search/searchcursor.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/search/search.min.js"></script>
    
    <style>
        :root {
            --bg-color: #1a202c;
            --surface-color: #2d3748;
            --border-color: #4a5568;
            --text-color: #e2e8f0;
            --brand-color: #818cf8; /* indigo-400 */
        }
        body {
            zoom: 0.7;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
        }
        .CodeMirror {
            border: 1px solid var(--border-color);
            border-radius: 0.375rem; /* rounded-md */
            height: 100%;
            font-size: 14px;
        }
        .CodeMirror-gutters {
            background-color: #1f2937 !important; /* bg-gray-800 */
            border-right: 1px solid var(--border-color);
        }
        .cm-editor-utama {
             display: none; /* Sembunyikan editor utama */
        }
        .form-textarea {
            background-color: var(--surface-color);
            border-color: var(--border-color);
            color: var(--text-color);
        }
        .form-textarea:focus {
            --tw-ring-color: var(--brand-color);
            border-color: var(--brand-color);
        }
        .modal-message-success { color: #4ade80; } /* text-green-400 */
        .modal-message-error { color: #f87171; } /* text-red-400 */
        .modal-message-info { color: #60a5fa; } /* text-blue-400 */
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-900 text-gray-200">

    <div class="flex flex-col min-h-screen max-w-screen-xl mx-auto p-4 gap-4">
        
        <header class="text-center">
            <h1 class="text-3xl font-bold text-indigo-400">Alat Modifikasi HTML v3.4 (Multi-JSON)</h1>
        </header>

        <input type="file" id="fileUploader" accept=".html,.htm,.txt,.php" style="display: none;" onchange="handleFileSelect(event)">
        
        <div class="flex flex-col bg-gray-800 p-4 rounded-lg shadow-lg gap-3">
            
            <div class="flex items-center gap-3 self-start">
                <div id="mainIndicator" class="w-4 h-4 rounded-full bg-red-500 transition-colors flex-shrink-0"></div>
                <span id="versionIndicator" class="text-2xl font-mono font-bold text-gray-600 whitespace-nowrap">[ KOSONG ]</span>
            </div>
            
            <div class="flex gap-2 flex-shrink-0 self-end">
                <button onclick="triggerFileUpload()" title="Unggah file HTML" class="bg-gray-700 hover:bg-blue-600 text-white font-medium py-2 px-3 rounded-md transition-colors flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <span>Upload</span>
                </button>
                <button onclick="pasteIntoMainEditor()" title="Tempel dari Clipboard" class="bg-gray-700 hover:bg-indigo-600 text-white font-medium py-2 px-3 rounded-md transition-colors flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
                    <span>Tempel</span>
                </button>
            </div>
            
            <div class="flex-1 relative min-h-0 cm-editor-utama">
                <textarea id="mainEditor" class="w-full h-full" placeholder="Tempel seluruh kode HTML Anda di sini..."></textarea>
            </div>
        </div>

        <div class="bg-gray-800 p-4 rounded-lg shadow-lg flex flex-col gap-3">
            <div class="flex justify-between items-center">
                <label for="quickCommandInput" class="block text-sm font-medium text-gray-300">2. Tempel Perintah Cepat Gemini (Bisa Multi-JSON)</label>
                <button onclick="pasteIntoQuickCommand()" title="Tempel Perintah Cepat" class="bg-gray-700 hover:bg-indigo-600 text-white font-medium py-1.5 px-3 rounded-md transition-colors flex items-center gap-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
                    <span>Tempel</span>
                </button>
                </div>
            <textarea id="quickCommandInput" rows="7" class="form-textarea w-full rounded-md shadow-sm text-sm font-mono p-2" placeholder='Tempel JSON Objek TUNGGAL {...} atau JSON ARRAY [...]
[
  {
    "snippet": "...",
    "target": "...",
    "action": "replace",
    "regex": false,
    "global": false
  },
  {
    "snippet": "...",
    "target": "...",
    "action": "insertAfter",
    "regex": true,
    "global": true
  }
]'></textarea>
            <button onclick="applyAndExecute()" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-transform transform hover:scale-105">
                Jalankan Perintah Cepat
            </button>
        </div>
        
        <div class="bg-gray-800 p-4 rounded-lg shadow-lg flex flex-col gap-3">
            
            <button onclick="copyResult()" title="Salin Hasil" class="w-full sm:w-auto bg-gray-600 hover:bg-green-600 text-white font-medium py-3 px-4 rounded-md transition-colors flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                Salin Hasil
            </button>
            <button onclick="downloadResult(currentFileName)" title="Download file hasil" class="w-full sm:w-auto bg-gray-600 hover:bg-teal-600 text-white font-medium py-3 px-4 rounded-md transition-colors flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Download File Hasil
            </button>
            <button onclick="copyPrompt()" title="Salin promp template" class="w-full sm:w-auto bg-gray-600 hover:bg-yellow-600 text-white font-medium py-3 px-4 rounded-md transition-colors flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                Salin Promp (WAJIB)
            </button>
        </div>

        
        <div class="bg-gray-800 p-4 rounded-lg shadow-lg flex flex-col gap-3">
            <h2 class="text-xl font-bold text-indigo-400">Pratinjau Layar (Mobile)</h2>
            <div class="flex justify-center mt-4 w-full px-2">
                <div class="border-8 border-gray-900 overflow-hidden w-full bg-white relative shadow-2xl flex flex-col mx-auto" style="max-width: 360px; border-radius: 2.5rem; aspect-ratio: 9/19; max-height: 80vh;">
                    
                    <div class="absolute top-0 inset-x-0 h-6 flex justify-center z-10 pointer-events-none">
                        <div class="h-5 bg-gray-900 rounded-b-xl" style="width: 100px;"></div>
                    </div>
                    
                    
                    <div class="flex-1 w-full bg-white relative mt-2">
                        <iframe id="mobilePreview" class="w-full h-full border-none absolute inset-0"></iframe>
                    </div>
                    
                    
                    <div class="h-12 bg-gray-900 w-full flex justify-around items-center px-6 shrink-0 text-gray-400">
                        <button onclick="historyBackPreview()" title="Kembali" class="p-2 hover:text-white transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                        </button>
                        <button onclick="updatePreview()" title="Home (Reload)" class="p-2 hover:text-white transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>
                        </button>
                        <button title="Recent" class="p-2 hover:text-white transition-colors cursor-default">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>
                        </button>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                <div class="bg-gray-900 rounded-md border border-red-800 flex flex-col h-48">
                    <div class="bg-red-900 text-white text-xs font-bold p-2 px-3">Console: Deteksi Error</div>
                    <div id="errorConsole" class="p-3 font-mono text-xs text-red-400 overflow-y-auto flex-1 whitespace-pre-wrap break-all"></div>
                </div>
                <div class="bg-gray-900 rounded-md border border-green-800 flex flex-col h-48">
                    <div class="bg-green-900 text-white text-xs font-bold p-2 px-3">Console: Sistem Berjalan</div>
                    <div id="sysConsole" class="p-3 font-mono text-xs text-green-400 overflow-y-auto flex-1 whitespace-pre-wrap break-all"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="alertModal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4 hidden">
        <div class="bg-gray-800 rounded-lg shadow-xl p-6 w-full max-w-sm mx-auto text-center border border-gray-700">
            <p id="modal-message" class="text-lg text-gray-200 mb-6"></p>
            <button id="modal-ok-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-8 rounded-lg transition-colors w-full sm:w-auto">
                OK
            </button>
        </div>
    </div>

    <script>
        let editor;
        let versionCounter = 0;
        let currentFileName = 'index.html'; 

        // --- FUNGSI MODAL ---
        const alertModal = document.getElementById('alertModal');
        const modalMessage = document.getElementById('modal-message');
        const modalOkBtn = document.getElementById('modal-ok-btn');

        function showAlert(message, type = 'info') {
            modalMessage.classList.remove('modal-message-success', 'modal-message-error', 'modal-message-info');
            if (type === 'success') {
                modalMessage.classList.add('modal-message-success');
            } else if (type === 'error') {
                modalMessage.classList.add('modal-message-error');
            } else {
                modalMessage.classList.add('modal-message-info');
            }
            modalMessage.textContent = message;
            alertModal.classList.remove('hidden');
            modalOkBtn.focus();
        }
        modalOkBtn.addEventListener('click', () => {
            alertModal.classList.add('hidden');
        });
        // --- AKHIR FUNGSI MODAL ---

        // --- FUNGSI PRATINJAU & CONSOLE ---
        let previewHistory = [];
        let previewTimeout = null;

        function updatePreview() {
            const iframe = document.getElementById('mobilePreview');
            if (!iframe) return;
            const htmlContent = editor.getValue();
            
            const interceptScript = `
                <script>
                    window.onerror = function(msg, url, line, col, error) {
                        window.parent.postMessage({ type: 'error', msg: msg + ' (Baris: ' + line + ')' }, '*');
                        return false;
                    };
                    const origLog = console.log;
                    console.log = function(...args) {
                        window.parent.postMessage({ type: 'log', msg: args.join(' ') }, '*');
                        origLog.apply(console, args);
                    };
                    const origWarn = console.warn;
                    console.warn = function(...args) {
                        window.parent.postMessage({ type: 'log', msg: 'WARN: ' + args.join(' ') }, '*');
                        origWarn.apply(console, args);
                    };
                    const origError = console.error;
                    console.error = function(...args) {
                        window.parent.postMessage({ type: 'error', msg: 'ERR: ' + args.join(' ') }, '*');
                        origError.apply(console, args);
                    };
                    const origInfo = console.info;
                    console.info = function(...args) {
                        window.parent.postMessage({ type: 'log', msg: 'INFO: ' + args.join(' ') }, '*');
                        origInfo.apply(console, args);
                    };
                <\/script>
            `;
            
            let injectedHtml = htmlContent;
            if (injectedHtml.includes('<head>')) {
                injectedHtml = injectedHtml.replace('<head>', '<head>\n' + interceptScript);
            } else {
                injectedHtml = interceptScript + '\n' + injectedHtml;
            }
            
            iframe.srcdoc = injectedHtml;
            
            if (previewHistory.length === 0 || previewHistory[previewHistory.length - 1] !== htmlContent) {
                previewHistory.push(htmlContent);
            }
        }

        function historyBackPreview() {
            if (previewHistory.length > 1) {
                previewHistory.pop(); 
                const previousHtml = previewHistory[previewHistory.length - 1];
                editor.setValue(previousHtml);
                updatePreview();
                showAlert("Kembali ke versi kode sebelumnya.", "info");
            } else {
                showAlert("Tidak ada riwayat halaman sebelumnya.", "error");
            }
        }

        window.addEventListener('message', function(e) {
            if (e.data && e.data.type) {
                const errConsole = document.getElementById('errorConsole');
                const sysConsole = document.getElementById('sysConsole');
                const time = new Date().toLocaleTimeString();
                if (e.data.type === 'error') {
                    if (errConsole) {
                        errConsole.innerHTML += `[${time}] ${e.data.msg}<br>`;
                        errConsole.scrollTop = errConsole.scrollHeight;
                    }
                } else if (e.data.type === 'log') {
                    if (sysConsole) {
                        sysConsole.innerHTML += `[${time}] ${e.data.msg}<br>`;
                        sysConsole.scrollTop = sysConsole.scrollHeight;
                    }
                }
            }
        });



        // --- Inisialisasi Editor CodeMirror ---
        document.addEventListener('DOMContentLoaded', () => {
            // Editor Utama (Kotak 1)
            editor = CodeMirror.fromTextArea(document.getElementById('mainEditor'), {
                mode: 'htmlmixed',
                theme: 'tokyo-night',
                lineNumbers: true,
                lineWrapping: true,
                autoCloseTags: true,
                autoCloseBrackets: true,
                gutters: ["CodeMirror-linenumbers"]
            });
            editor.on('change', () => {
                updateIndicators();
                clearTimeout(previewTimeout);
                previewTimeout = setTimeout(updatePreview, 800);
            }); 
            editor.setSize(null, "100%");
            
            updateIndicators(); 
        });

        // --- FUNGSI INDIKATOR (Disederhanakan) ---
        function updateIndicators() {
            if (!editor) return; 

            const mainIndicator = document.getElementById('mainIndicator');
            const versionIndicator = document.getElementById('versionIndicator');
            const mainContent = editor.getValue();

            // Cek Main Editor (Kotak 1)
            if (mainContent.length > 0) {
                mainIndicator.classList.remove('bg-red-500');
                mainIndicator.classList.add('bg-green-500');
                versionIndicator.textContent = 'Versi ' + versionCounter;
                versionIndicator.classList.remove('text-gray-600');
                versionIndicator.classList.add('text-indigo-400');
            } else {
                mainIndicator.classList.remove('bg-green-500');
                mainIndicator.classList.add('bg-red-500');
                versionIndicator.textContent = '[ KOSONG ]';
                versionIndicator.classList.remove('text-indigo-400');
                versionIndicator.classList.add('text-gray-600');
                versionCounter = 0;
            }
        }

        // --- FUNGSI UPLOAD FILE & PASTE ---
        function triggerFileUpload() {
            document.getElementById('fileUploader').click();
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            currentFileName = file.name;

            const isHtml = file.type.startsWith('text/html') || file.name.endsWith('.html') || file.name.endsWith('.htm');
            const isText = file.type.startsWith('text/plain');
            const isPhp = file.name.endsWith('.php');

            if (!isHtml && !isText && !isPhp) {
                showAlert("Error: Harap pilih file .html, .txt, atau .php.", 'error');
                event.target.value = null; 
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                editor.setValue(e.target.result);
                versionCounter = 1; // Set Versi ke 1
                updateIndicators(); 
                showAlert("File '" + file.name + "' berhasil dimuat!", 'success');
            };
            reader.onerror = function() { showAlert("Error: Gagal membaca file.", 'error'); };
            reader.readAsText(file);
            event.target.value = null;
        }

        async function pasteIntoMainEditor() {
            try {
                const text = await navigator.clipboard.readText();
                editor.setValue(text);
                versionCounter = 1; // Set versi ke 1
                updateIndicators(); // Update UI
                showAlert("Teks berhasil ditempel ke Editor Utama.", "info");
            } catch (err) {
                console.error('Gagal menempel:', err.message);
                showAlert("Tempel otomatis gagal. Silakan klik editor & gunakan Ctrl+V.", "error");
            }
        }
        
        async function pasteIntoQuickCommand() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('quickCommandInput').value = text;
                showAlert("Teks berhasil ditempel ke Perintah Cepat.", "info");
            } catch (err) {
                console.error('Gagal menempel:', err.message);
                showAlert("Tempel otomatis gagal. Silakan gunakan Ctrl+V.", "error");
            }
        }
        
        // --- FUNGSI REGEX HELPER ---
        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // --- DIUBAH: FUNGSI INTI (Multi-Perintah JSON v3.4) ---
        function applyAndExecute() {
            let currentHtml = editor.getValue();
            const commandInput = document.getElementById('quickCommandInput').value;
            const quickCommandTextarea = document.getElementById('quickCommandInput');

            // DIUBAH: try...finally untuk memastikan kotak input dibersihkan (Tugas 2)
            try { 
                if (!currentHtml) {
                    showAlert("Kesalahan: Status Kode Sumber (Kotak 1) masih kosong!", 'error');
                    return;
                }
                if (!commandInput) {
                    showAlert("Kesalahan: Kotak Perintah Cepat (Kotak 2) masih kosong.", 'error');
                    return;
                }

                let cmds;
                try {
                    cmds = JSON.parse(commandInput);
                } catch (e) {
                    showAlert("Error: Format JSON di Perintah Cepat tidak valid. " + e.message, 'error');
                    return;
                }

                // DIUBAH: Standarisasi - Selalu bekerja dengan Array (Tugas 3)
                if (!Array.isArray(cmds)) {
                    cmds = [cmds]; // Ubah objek tunggal menjadi array berisi satu objek
                }

                if (cmds.length === 0) {
                    showAlert("Peringatan: JSON Array kosong, tidak ada perintah untuk dijalankan.", 'error');
                    return;
                }

                let successCount = 0;
                let lastActionWasDelete = false;

                // DIUBAH: Loop untuk setiap perintah dalam Array (Tugas 3)
                for (let i = 0; i < cmds.length; i++) {
                    const cmd = cmds[i];
                    
                    const snippet = cmd.snippet || ""; // default ke string kosong jika tidak ada
                    const target = cmd.target;
                    const action = cmd.action;
                    const isRegex = !!cmd.regex;
                    const isGlobal = !!cmd.global;

                    // Validasi JSON per-perintah
                    if (!target || !action) {
                        showAlert(`Error Perintah ${i + 1}/${cmds.length}: JSON harus berisi 'target' dan 'action'.`, 'error');
                        return; // Hentikan semua proses jika 1 gagal
                    }
                    if (typeof cmd.snippet === 'undefined' && (action === 'insertBefore' || action === 'insertAfter')) {
                        showAlert(`Error Perintah ${i + 1}/${cmds.length}: 'snippet' harus ada untuk aksi '${action}'!`, 'error');
                        return;
                    }

                    let searchPattern;
                    const flags = (isGlobal ? 'g' : '') + 'm'; 

                    try {
                        if (isRegex) {
                            searchPattern = new RegExp(target, flags);
                        } else {
                            const escapedTarget = escapeRegExp(target);
                            searchPattern = new RegExp(escapedTarget, flags);
                        }
                    } catch (e) {
                        showAlert(`Regex Error Perintah ${i + 1}/${cmds.length}: Pola 'target' tidak valid. ` + e.message, 'error');
                        return;
                    }

                    // DIUBAH: Uji pola pada 'currentHtml' yang sudah dimodifikasi
                    if (!searchPattern.test(currentHtml)) {
                        showAlert(`Peringatan Perintah ${i + 1}/${cmds.length}: 'target' (Kode Patokan) tidak ditemukan. Proses dihentikan,Tolong buat ulang seluruh Perintah`, 'error');
                        return; // Hentikan semua
                    }

                    let modifiedHtml = '';
                    
                    // DIUBAH: Ganti 'originalHtml' dengan 'currentHtml'
                    switch (action) {
                        case 'insertBefore':
                            modifiedHtml = currentHtml.replace(searchPattern, snippet + '\n' + '$&');
                            break;
                        case 'insertAfter':
                            modifiedHtml = currentHtml.replace(searchPattern, '$&' + '\n' + snippet);
                            break;
                        case 'replace':
                            modifiedHtml = currentHtml.replace(searchPattern, snippet);
                            lastActionWasDelete = !snippet; // Catat jika ini adalah aksi hapus
                            break;
                        default:
                            showAlert(`Error Perintah ${i + 1}/${cmds.length}: 'action' tidak valid. Gunakan 'insertBefore', 'insertAfter', or 'replace'.`, 'error');
                            return;
                    }
                    
                    currentHtml = modifiedHtml; // Update HTML untuk iterasi berikutnya
                    successCount++;
                } // Akhir loop for

                
                editor.setValue(currentHtml); // Set nilai final setelah semua loop selesai
                
                if (successCount === cmds.length) {
                    let successMessage = `Perintah Cepat Selesai: ${successCount} dari ${cmds.length} perintah berhasil dijalankan!`;
                    if (lastActionWasDelete && successCount === 1) {
                        successMessage = "Perintah Cepat Dijalankan: Kode patokan berhasil dihapus!";
                    }
                    showAlert(successMessage, 'success');
                }
                
                versionCounter++;
                updateIndicators();
                
            } finally {
                // DIUBAH: Selalu bersihkan input, baik berhasil maupun gagal (Tugas 2)
                quickCommandTextarea.value = '';
            }
        }

        // --- Fungsi Tombol Bawah ---
        function copyResult() {
            const editorContent = editor.getValue();
            if (!editorContent) {
                showAlert("Editor kosong, tidak ada yang bisa disalin.", 'error');
                return;
            }
            
            navigator.clipboard.writeText(editorContent).then(() => {
                showAlert("Hasil berhasil disalin ke clipboard!", 'info');
            }).catch(err => {
                 showAlert("Gagal menyalin. Coba salin manual.", 'error');
            });
        }

        function downloadResult(filename) {
            const content = editor.getValue();
            if (!content) {
                showAlert("Editor kosong, tidak ada yang bisa di-download.", 'error');
                return;
            }
            try {
                const blob = new Blob([content], { type: 'text/html;charset=utf-8' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename; 
                a.style.display = 'none'; 
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(a.href);
            } catch (err) {
                showAlert("Gagal membuat file download: " + err.message, 'error');
            }
        }
