<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Maintenance - Pandawa Digital</title>
    
    <meta http-equiv="refresh" content="5;url=https://pandawa-digital.com">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
            text-align: center;
        }

        .card {
            background: white;
            padding: 40px 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
        }

        .icon {
            font-size: 50px;
            margin-bottom: 20px;
        }

        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 15px;
        }

        p {
            color: #7f8c8d;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .alert {
            background-color: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            margin-bottom: 25px;
            border: 1px solid #ffeeba;
        }

        .btn {
            display: inline-block;
            background-color: #007bff;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">🛠️</div>
        <h1>Pemeliharaan Server</h1>
        
        <div class="alert">
            <strong>Info:</strong> Halaman ini telah dipindahkan secara permanen ke alamat baru.
        </div>

        <p>
            Mohon maaf atas ketidaknyamanannya. Kami sedang memindahkan layanan kami ke infrastruktur yang lebih baik. 
            Anda akan dialihkan secara otomatis dalam beberapa detik <span class="loader"></span>
        </p>

        <a href="https://pandawa-digital.com" class="btn">Buka Pandawa Digital</a>
    </div>

    <script>
        // Pengalihan via JavaScript (setelah 3 detik)
        setTimeout(function() {
            window.location.href = "https://pandawa-digital.com";
        }, 3000);
    </script>

</body>
</html>
